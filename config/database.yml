# SQLite. Versions 3.8.0 and up are supported.
#   gem install sqlite3
#
#   Ensure the SQLite 3 gem is defined in your Gemfile
#   gem "sqlite3"
#
default: &default
  adapter: sqlite3
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  timeout: 5000

development:
  primary:
    <<: *default
    database: storage/development.sqlite3
  queue:
    <<: *default
    database: storage/development_queue.sqlite3
    migrations_paths: db/queue_migrate

# Warning: The database defined as "test" will be erased and
# re-generated from your development database when you run "rake".
# Do not set this db to the same as development or production.
test:
  <<: *default
  database: storage/test.sqlite3

<% if ENV["DATABASE_URL"] %>
# When DATABASE_URL is set, derive adapter and connection settings from it.
# Satellite databases (cache, queue, cable) append a suffix to the database name.
production:
  primary:
    url: <%= ENV["DATABASE_URL"] %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  cache:
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |u| u.path = u.path.sub(%r{/([^/]+)$}, '/\1_cache') }.to_s %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    migrations_paths: db/cache_migrate
  queue:
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |u| u.path = u.path.sub(%r{/([^/]+)$}, '/\1_queue') }.to_s %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    migrations_paths: db/queue_migrate
  cable:
    url: <%= URI.parse(ENV["DATABASE_URL"]).tap { |u| u.path = u.path.sub(%r{/([^/]+)$}, '/\1_cable') }.to_s %>
    pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
    migrations_paths: db/cable_migrate

<% else %>
# When DATABASE_URL is not set, fall back to SQLite file-based databases
# stored in the storage/ directory (mounted as a persistent Docker volume).
production:
  primary:
    <<: *default
    database: storage/production.sqlite3
  cache:
    <<: *default
    database: storage/production_cache.sqlite3
    migrations_paths: db/cache_migrate
  queue:
    <<: *default
    database: storage/production_queue.sqlite3
    migrations_paths: db/queue_migrate
  cable:
    <<: *default
    database: storage/production_cable.sqlite3
    migrations_paths: db/cable_migrate
<% end %>
