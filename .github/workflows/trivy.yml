---
name: Trivy Security Scan

on: # yamllint disable-line rule:truthy
  push:
    branches: ["main"]
    paths:
      - "**/Dockerfile*"
      - "docker-compose.yml"
  pull_request:
    branches: ["main"]
    paths:
      - "**/Dockerfile*"
      - "docker-compose.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions: {}

jobs:
  trivy:
    runs-on: ubuntu-latest

    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Run Trivy vulnerability scanner
        id: trivy
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: "config"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@7188fc363630916deb702c7fdcf4e481b751f97a # v4
        if: always()
        with:
          sarif_file: "trivy-results.sarif"

      - name: Summarize Trivy scan
        if: always()
        run: |
          {
            echo "## Trivy security scan"
            echo ""
            echo "| Item | Value |"
            echo "| --- | --- |"
            echo "| Scan type | config |"
            echo "| Scan ref | . |"
            echo "| SARIF output | trivy-results.sarif |"
            echo "| Scan result | ${{ steps.trivy.outcome }} |"
          } >> "$GITHUB_STEP_SUMMARY"
